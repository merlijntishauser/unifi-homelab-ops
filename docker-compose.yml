services:
  api:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    ports:
      - "5174:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    environment:
      - API_PROXY_TARGET=http://api:8000
    depends_on:
      - api
