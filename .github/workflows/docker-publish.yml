name: Docker Publish

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            dockerfile: ./Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
          - variant: standard
            dockerfile: ./Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - variant: alpine
            dockerfile: ./Dockerfile.alpine
            platform: linux/amd64
            runner: ubuntu-latest
          - variant: alpine
            dockerfile: ./Dockerfile.alpine
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: platform_pair
        run: echo "pair=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          outputs: type=image,name=merlijntishauser/unifi-homelab-ops,push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ steps.platform_pair.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-${{ steps.platform_pair.outputs.pair }}
      - if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests/${{ matrix.variant }}
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.variant }}/${{ steps.platform_pair.outputs.pair }}"
      - if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.variant }}-${{ steps.platform_pair.outputs.pair }}
          path: /tmp/digests
          retention-days: 1

  merge:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - variant: standard
            tags: |
              type=semver,pattern={{version}}
              type=semver,pattern={{major}}.{{minor}}
              type=semver,pattern={{major}}
              type=ref,event=branch
              type=sha,prefix=sha-
              type=raw,value=latest,enable={{is_default_branch}}
          - variant: alpine
            tags: |
              type=semver,pattern={{version}},suffix=-alpine
              type=semver,pattern={{major}}.{{minor}},suffix=-alpine
              type=semver,pattern={{major}},suffix=-alpine
              type=ref,event=branch,suffix=-alpine
              type=sha,prefix=sha-,suffix=-alpine
              type=raw,value=alpine,enable={{is_default_branch}}
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: digest-${{ matrix.variant }}-*
          path: /tmp/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: merlijntishauser/unifi-homelab-ops
          tags: ${{ matrix.tags }}
      - run: |
          cd /tmp/digests/${{ matrix.variant }}
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(for f in *; do echo "merlijntishauser/unifi-homelab-ops@$(cat "$f")"; done)
