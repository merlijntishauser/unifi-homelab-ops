name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv run ruff check app/
      - run: uv run mypy app/
      - run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/ --no-warn-ignored
      - run: npx vitest run --coverage
      - name: React Doctor
        id: react_doctor
        uses: millionco/react-doctor@main
        with:
          directory: frontend
      - name: Check React Doctor score
        run: |
          score="${{ steps.react_doctor.outputs.score }}"
          echo "React Doctor score: ${score:-unknown}/100"
          if [ -z "$score" ] || [ "$score" -lt 100 ]; then
            echo "::error::React Doctor score below 100 (got: ${score:-unknown})"
            exit 1
          fi

  complexity:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd backend && uv sync
      - run: cd frontend && npm ci
      - run: ./scripts/check-complexity.sh

  docker-images:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            dockerfile: ./Dockerfile
            image_tag: unifi-homelab-ops:ci-standard
            container_name: unifi-homelab-ops-ci-standard
            host_port: "18080"
            cache_scope: ci-docker-standard
          - variant: alpine
            dockerfile: ./Dockerfile.alpine
            image_tag: unifi-homelab-ops:ci-alpine
            container_name: unifi-homelab-ops-ci-alpine
            host_port: "18081"
            cache_scope: ci-docker-alpine
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: .cache/trivy
          key: trivy-db-${{ runner.os }}-${{ matrix.variant }}
          restore-keys: |
            trivy-db-${{ runner.os }}-
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ matrix.image_tag }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
      - run: ./scripts/smoke-test-image.sh "${{ matrix.image_tag }}" "${{ matrix.container_name }}" "${{ matrix.host_port }}"
      - id: trivy_scan
        continue-on-error: true
        run: |
          mkdir -p .cache/trivy
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/.cache:/root/.cache" \
            -v "$PWD:/work" \
            -w /work \
            ghcr.io/aquasecurity/trivy:0.68.1 image \
            --scanners vuln \
            --format sarif \
            --output "trivy-results-${{ matrix.variant }}.sarif" \
            --vuln-type os,library \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            "${{ matrix.image_tag }}"
      - id: trivy_sarif
        if: always() && github.event_name != 'pull_request'
        run: |
          if [ -f "trivy-results-${{ matrix.variant }}.sarif" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: github/codeql-action/upload-sarif@v4
        if: always() && github.event_name != 'pull_request' && steps.trivy_sarif.outputs.present == 'true'
        with:
          sarif_file: trivy-results-${{ matrix.variant }}.sarif
          category: trivy-${{ matrix.variant }}
      - name: Fail on High/Critical image vulnerabilities
        if: steps.trivy_scan.outcome == 'failure'
        run: exit 1

  e2e-production:
    runs-on: ubuntu-latest
    needs: [docker-images]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: docker/setup-buildx-action@v3
      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: unifi-homelab-ops:local
          cache-from: type=gha,scope=ci-docker-standard
      - name: Start e2e stack
        run: docker compose -f docker-compose.e2e.yml up -d --build --wait
      - run: cd frontend && npm ci
      - run: cd frontend && npx playwright install --with-deps chromium
      - name: Run production e2e tests
        run: cd frontend && npx playwright test --config playwright.e2e-prod.config.ts
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-prod-traces
          path: frontend/test-results/
          retention-days: 7
      - name: Teardown e2e stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down
