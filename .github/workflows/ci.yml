name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv run ruff check app/
      - run: uv run mypy app/
      - run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/ --no-warn-ignored
      - run: npx vitest run --coverage
      - name: React Doctor
        run: |
          score=$(npx react-doctor . --yes --score 2>/dev/null | tail -1 | tr -dc '0-9')
          echo "React Doctor score: $score/100"
          if [ -z "$score" ] || [ "$score" -lt 90 ]; then
            echo "::error::React Doctor score below 90 (got: ${score:-unknown})"
            exit 1
          fi

  complexity:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd backend && uv sync
      - run: cd frontend && npm ci
      - run: ./scripts/check-complexity.sh

  docker-images:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            dockerfile: ./Dockerfile
            image_tag: unifi-firewall-analyser:ci-standard
            container_name: unifi-firewall-analyser-ci-standard
            host_port: "18080"
            cache_scope: ci-docker-standard
          - variant: alpine
            dockerfile: ./Dockerfile.alpine
            image_tag: unifi-firewall-analyser:ci-alpine
            container_name: unifi-firewall-analyser-ci-alpine
            host_port: "18081"
            cache_scope: ci-docker-alpine
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ matrix.image_tag }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
      - run: ./scripts/smoke-test-image.sh "${{ matrix.image_tag }}" "${{ matrix.container_name }}" "${{ matrix.host_port }}"
      - uses: aquasecurity/setup-trivy@v0.2.3
        with:
          version: v0.68.1
          cache: true
      - uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ matrix.image_tag }}
          format: sarif
          output: trivy-results-${{ matrix.variant }}.sarif
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          limit-severities-for-sarif: true
          exit-code: "1"
          skip-setup-trivy: true
      - id: trivy_sarif
        if: always() && github.event_name != 'pull_request'
        run: |
          if [ -f "trivy-results-${{ matrix.variant }}.sarif" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: github/codeql-action/upload-sarif@v4
        if: always() && github.event_name != 'pull_request' && steps.trivy_sarif.outputs.present == 'true'
        with:
          sarif_file: trivy-results-${{ matrix.variant }}.sarif
          category: trivy-${{ matrix.variant }}
