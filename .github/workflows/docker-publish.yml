name: Docker Publish

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            dockerfile: ./Dockerfile
            cache_scope: docker-standard
            tags: |
              type=semver,pattern={{version}}
              type=semver,pattern={{major}}.{{minor}}
              type=semver,pattern={{major}}
              type=ref,event=branch
              type=sha,prefix=sha-
              type=raw,value=latest,enable={{is_default_branch}}
          - variant: alpine
            dockerfile: ./Dockerfile.alpine
            cache_scope: docker-alpine
            tags: |
              type=semver,pattern={{version}},suffix=-alpine
              type=semver,pattern={{major}}.{{minor}},suffix=-alpine
              type=semver,pattern={{major}},suffix=-alpine
              type=ref,event=branch,suffix=-alpine
              type=sha,prefix=sha-,suffix=-alpine
              type=raw,value=alpine,enable={{is_default_branch}}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: merlijntishauser/unifi-homelab-ops
          tags: ${{ matrix.tags }}
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
