services:
  mock-controller:
    build: ./e2e/mock_controller
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3

  app:
    image: unifi-firewall-analyser:local
    ports:
      - "18080:8080"
    environment:
      - UNIFI_URL=http://mock-controller:8000
      - UNIFI_USER=test
      - UNIFI_PASS=test
      - UNIFI_SITE=default
      - UNIFI_VERIFY_SSL=false
      - APP_PASSWORD=test
      - LOG_LEVEL=DEBUG
      - UNIFI_CACHE_TTL_SECONDS=0
    depends_on:
      mock-controller:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=3).read()"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 5
